name: Lint info.xml

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Validate info.xml
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Download info.xsd
        run: curl -sSL -o info.xsd https://apps.nextcloud.com/schema/apps/info.xsd

      - name: Validate info.xml
        run: xmllint --schema info.xsd app/appinfo/info.xml --noout
